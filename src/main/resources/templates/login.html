<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Log in — DataVista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="wrap-narrow">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Log in to analyze your datasets</p>

    <div class="alert alert-error" th:if="${param.error}">Invalid email or password.</div>
    <div class="alert alert-success" th:if="${param.registered}">Account created — log in below.</div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="form-group">
        <label for="username">Email</label>
        <input type="email" id="username" name="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Log in</button>
    </form>

    <p class="auth-footer">No account yet? <a th:href="@{/register}">Register</a></p>
  </div>
</div>
</body>
</html>
