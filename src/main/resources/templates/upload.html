<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Upload — DataVista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="wrap">
  <div th:replace="fragments/layout :: nav"></div>

  <h1>Upload a dataset</h1>
  <p class="subtitle">CSV, JSON, or Excel (.xlsx/.xls) files are supported. Your data is profiled instantly.</p>

  <div class="card">
    <form th:action="@{/upload}" method="post" enctype="multipart/form-data" id="uploadForm">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="dropzone" id="dropzone">
        <div>Drag and drop a CSV, JSON, or Excel file here, or click to browse</div>
        <div class="filename" id="filenameDisplay"></div>
      </div>
      <input type="file" name="file" id="fileInput" accept=".csv,.json,.xlsx,.xls" required style="display:none;" />

      <button type="submit" class="btn btn-primary">Analyze dataset</button>
    </form>
  </div>
</div>

<script th:inline="none">
  var dropzone = document.getElementById('dropzone');
  var fileInput = document.getElementById('fileInput');
  var filenameDisplay = document.getElementById('filenameDisplay');

  dropzone.addEventListener('click', function () {
    fileInput.click();
  });

  dropzone.addEventListener('dragover', function (e) {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });

  dropzone.addEventListener('dragleave', function () {
    dropzone.classList.remove('dragover');
  });

  dropzone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) {
      fileInput.files = e.dataTransfer.files;
      filenameDisplay.textContent = fileInput.files[0].name;
    }
  });

  fileInput.addEventListener('change', function () {
    if (fileInput.files.length > 0) {
      filenameDisplay.textContent = fileInput.files[0].name;
    }
  });
</script>
</body>
</html>
