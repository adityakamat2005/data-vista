<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>History — DataVista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="wrap">
  <div th:replace="fragments/layout :: nav"></div>

  <h1>History</h1>
  <p class="subtitle">All datasets you've analyzed.</p>

  <div class="alert alert-error" th:if="${compareError}">Select exactly two datasets to compare.</div>

  <form th:action="@{/history}" method="get" class="toolbar">
    <input type="text" name="search" placeholder="Search by filename" th:value="${search}" />
    <select name="label">
      <option value="All" th:selected="${label == 'All'}">All health labels</option>
      <option value="Excellent" th:selected="${label == 'Excellent'}">Excellent</option>
      <option value="Good" th:selected="${label == 'Good'}">Good</option>
      <option value="Fair" th:selected="${label == 'Fair'}">Fair</option>
      <option value="Poor" th:selected="${label == 'Poor'}">Poor</option>
    </select>
    <button type="submit" class="btn btn-secondary">Filter</button>
  </form>

  <div class="card">
    <table>
      <tr>
        <th></th><th>File</th><th>Health</th><th>Score</th><th>Rows</th><th>Analyzed</th><th></th>
      </tr>
      <tr th:each="entry : ${historyPage.content}">
        <td><input type="checkbox" name="selected" th:value="${entry.id}" class="compare-checkbox" /></td>
        <td><a th:href="@{/history/{id}(id=${entry.id})}" th:text="${entry.fileName}">file.csv</a></td>
        <td>
          <span th:if="${entry.healthLabel == 'Excellent'}" class="badge badge-good">Excellent</span>
          <span th:if="${entry.healthLabel == 'Good'}" class="badge badge-good">Good</span>
          <span th:if="${entry.healthLabel == 'Fair'}" class="badge badge-warning">Fair</span>
          <span th:if="${entry.healthLabel == 'Poor'}" class="badge badge-danger">Poor</span>
        </td>
        <td th:text="${entry.healthScore}">0</td>
        <td th:text="${entry.rowCount}">0</td>
        <td th:text="${#temporals.format(entry.createdAt, 'yyyy-MM-dd HH:mm')}">date</td>
        <td>
          <form th:action="@{/history/{id}/delete(id=${entry.id})}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
          </form>
        </td>
      </tr>
    </table>
  </div>

  <div class="btn-row">
    <button type="button" id="compareBtn" class="btn btn-primary">Compare selected (pick 2)</button>
  </div>

  <div class="pagination" th:if="${historyPage.totalPages > 1}">
    <a th:if="${historyPage.number > 0}"
       th:href="@{/history(search=${search}, label=${label}, page=${historyPage.number - 1})}"
       class="btn btn-secondary btn-sm">Previous</a>
    <span style="align-self:center; color:var(--text-dim); font-size:14px;">
      Page <span th:text="${historyPage.number + 1}">1</span> of <span th:text="${historyPage.totalPages}">1</span>
    </span>
    <a th:if="${historyPage.number + 1 < historyPage.totalPages}"
       th:href="@{/history(search=${search}, label=${label}, page=${historyPage.number + 1})}"
       class="btn btn-secondary btn-sm">Next</a>
  </div>

</div>

<script th:inline="none">
  var compareBtn = document.getElementById('compareBtn');
  var checkboxes = document.querySelectorAll('.compare-checkbox');

  checkboxes.forEach(function (cb) {
    cb.addEventListener('change', function () {
      var checked = document.querySelectorAll('.compare-checkbox:checked');
      if (checked.length > 2) {
        cb.checked = false;
      }
    });
  });

  compareBtn.addEventListener('click', function () {
    var checked = document.querySelectorAll('.compare-checkbox:checked');
    if (checked.length !== 2) {
      alert('Select exactly two datasets to compare.');
      return;
    }
    var params = [];
    checked.forEach(function (cb) {
      params.push('selected=' + encodeURIComponent(cb.value));
    });
    window.location.href = '/compare?' + params.join('&');
  });
</script>
</body>
</html>
