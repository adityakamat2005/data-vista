<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Account — DataVista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="wrap">
  <div th:replace="fragments/layout :: nav"></div>

  <h1>Account settings</h1>
  <p class="subtitle">Manage your profile and password.</p>

  <div class="card">
    <h3>Profile</h3>
    <p>Display name: <strong th:text="${displayName}">Name</strong></p>
    <p>Email: <strong th:text="${userEmail}">email@example.com</strong></p>
  </div>

  <div class="card">
    <h3>Change password</h3>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/account/password}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="form-group">
        <label for="currentPassword">Current password</label>
        <input type="password" id="currentPassword" name="currentPassword" required />
      </div>
      <div class="form-group">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary">Update password</button>
    </form>
  </div>
</div>
</body>
</html>
