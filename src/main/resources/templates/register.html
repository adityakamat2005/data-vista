<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Register — DataVista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="wrap-narrow">
  <div class="auth-card">
    <h1>Create an account</h1>
    <p class="auth-subtitle">Start profiling your datasets in minutes</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="form-group">
        <label for="displayName">Display name</label>
        <input type="text" id="displayName" name="displayName" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a th:href="@{/login}">Log in</a></p>
  </div>
</div>
</body>
</html>
